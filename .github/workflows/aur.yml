name: Publish to AUR

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate PKGBUILD
        run: |
          cat > PKGBUILD << PKGBUILD_EOF
          # Maintainer: IRendy <irendy@qq.com>

          pkgname="komitoto"
          pkgver=${{ steps.version.outputs.version }}
          pkgrel=1
          pkgdesc="A CLI assistant for HAM"
          url="https://github.com/IRendy/komitoto"
          arch=("x86_64" "aarch64")
          license=("MIT")
          options=(!debug)

          makedepends=(
            'cargo'
            'git'
            'sqlite'
          )
          depends=('gcc-libs' 'sqlite')
          source=("git+\$url.git#tag=v${{ steps.version.outputs.version }}")
          sha256sums=('SKIP')

          pkgver() {
            cd "\$pkgname"
            sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1
          }

          prepare() {
            cd "\$pkgname"

            # Use system SQLite instead of bundled
            sed -i 's/features = \["bundled"\]/features = []/' Cargo.toml
            cargo update

            cargo fetch --locked --target "\$(rustc -vV | sed -n 's/host: \(.*\)/\1/p')"
          }

          build() {
            cd "\$pkgname"
            export SQLITE3_LIB_DIR="/usr/lib"
            export SQLITE3_INCLUDE_DIR="/usr/include"
            export RUSTFLAGS+=" --remap-path-prefix=\$srcdir=/ "
            cargo build --release --locked --target-dir target
          }

          check() {
            cd "\$pkgname"
            export SQLITE3_LIB_DIR="/usr/lib"
            export SQLITE3_INCLUDE_DIR="/usr/include"
            cargo test --release --locked
          }

          package() {
            cd "\$pkgname"

            install -Dm755 "target/release/\$pkgname" "\$pkgdir/usr/bin/\$pkgname"

            install -Dm644 -t "\$pkgdir/usr/share/\$pkgname/" \
              "hamradio-zones-geojson-main/cqzones.geojson" \
              "hamradio-zones-geojson-main/ituzones.geojson"
          }
          PKGBUILD_EOF

      - name: Generate .SRCINFO
        run: |
          cat > .SRCINFO << SRCINFO_EOF
          pkgbase = komitoto
          	pkgdesc = A CLI assistant for HAM
          	pkgver = ${{ steps.version.outputs.version }}
          	pkgrel = 1
          	url = https://github.com/IRendy/komitoto
          	arch = x86_64
          	arch = aarch64
          	license = MIT
          	makedepends = cargo
          	makedepends = git
          	makedepends = sqlite
          	depends = gcc-libs
          	depends = sqlite
          	source = git+https://github.com/IRendy/komitoto.git#tag=v${{ steps.version.outputs.version }}
          	sha256sums = SKIP

          pkgname = komitoto
          SRCINFO_EOF

      - name: Publish to AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o UserKnownHostsFile=~/.ssh/known_hosts"

          git clone ssh://aur@aur.archlinux.org/komitoto.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git config user.name "IRendy"
          git config user.email "irendy@qq.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to ${{ steps.version.outputs.version }}"
          git push origin master
